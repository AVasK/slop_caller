<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>VCall — prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="video-stage">
        <div id="call-stack">
          <div id="call-layout">
            <div id="remote-fullscreen">
              <video id="remote-video" playsinline autoplay></video>
              <div id="remote-name-overlay">
                <span id="remote-name-text">Peer</span>
              </div>
            </div>
            <div id="local-pip" hidden>
              <canvas id="feed-canvas" width="640" height="480" aria-label="Your camera"></canvas>
            </div>
            <div id="audio-only-call" hidden>
              <div class="audio-only-remote" id="audio-only-remote-name">Peer</div>
              <div class="audio-only-you">You</div>
            </div>
          </div>

          <!-- Top bar: status only, visible during an active call -->
          <div id="rtc-bar">
            <span id="rtc-status" class="rtc-status"></span>
          </div>

          <div id="mic-meter" aria-hidden="true">
            <span id="mic-meter-label">Mic</span>
            <div id="mic-meter-track">
              <div id="mic-meter-fill"></div>
            </div>
          </div>

          <!-- Network quality indicator — top-left, below mic meter -->
          <div id="net-quality" aria-hidden="true">
            <button id="btn-net-quality" class="net-quality-btn" aria-label="Network quality" title="Network quality">
              <svg class="net-quality-icon" viewBox="0 0 18 14" fill="none" aria-hidden="true">
                <rect class="bar bar-1" x="0"  y="8" width="4" height="6" rx="1"/>
                <rect class="bar bar-2" x="7"  y="4" width="4" height="10" rx="1"/>
                <rect class="bar bar-3" x="14" y="0" width="4" height="14" rx="1"/>
              </svg>
            </button>
            <div id="net-stats" class="net-stats" hidden>
              <span id="net-rtt"></span>
              <span id="net-jitter"></span>
              <span id="net-loss"></span>
            </div>
          </div>

          <!-- Full-screen overlay: lobby before a session, status message during setup -->
          <div id="feed-placeholder">
            <!-- Lobby: shown when no session is active -->
            <div id="lobby">
              <p class="lobby-title">VCall</p>
              <div class="lobby-name-row">
                <input
                  type="text"
                  id="display-name-input"
                  class="display-name-input"
                  maxlength="32"
                  placeholder="Your name"
                  autocomplete="name"
                />
              </div>
              <div class="lobby-actions">
                <button type="button" id="btn-start-session" class="btn-lobby-primary">
                  Start a session
                </button>
                <button type="button" id="btn-show-join" class="btn-lobby-secondary">
                  Join a session
                </button>
              </div>
              <div id="join-code-form" class="join-code-form" hidden>
                <input
                  type="text"
                  id="join-code-input"
                  class="join-code-input"
                  maxlength="6"
                  placeholder="Session code"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  autocomplete="off"
                />
                <button type="button" id="btn-join-session" class="btn-lobby-primary join-go">Join</button>
              </div>
            </div>

            <!-- Session-waiting: shown after "Start a session" — code visible immediately -->
            <div id="session-waiting" hidden>
              <p class="lobby-title">Session ready</p>
              <p class="session-share-hint">Share the code or link with who you want to call</p>
              <div class="session-code-block">
                <span id="session-code-display" class="session-code-big"></span>
              </div>
              <button type="button" id="btn-copy-session-link" class="btn-lobby-secondary copy-link-btn">
                Copy link
              </button>
              <p id="session-status-msg" class="session-status-msg"></p>
              <button type="button" id="btn-cancel-session" class="btn-lobby-text">Cancel</button>
            </div>

            <!-- Plain status line: shown when joining someone else's session -->
            <p id="placeholder-msg" hidden></p>
          </div>
        </div>
      </div>

      <div id="status-toast" role="status" aria-live="polite"></div>

      <div id="controls" aria-hidden="true">
        <button
          type="button"
          id="btn-mic"
          class="btn-round"
          aria-label="Toggle microphone"
          aria-pressed="false"
          title="Mute / unmute"
          disabled
        >
          <svg viewBox="0 0 24 24">
            <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z" />
            <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </button>
        <button
          type="button"
          id="btn-camera"
          class="btn-round"
          aria-label="Toggle camera"
          aria-pressed="false"
          title="Camera on / off"
        >
          <svg viewBox="0 0 24 24">
            <path d="M15 10l4.553-2.276A1 1 0 0 1 21 8.723v6.554a1 1 0 0 1-1.447.894L15 14v-4z" />
            <rect x="2" y="7" width="13" height="10" rx="2" />
          </svg>
        </button>
        <button type="button" id="btn-chat" class="btn-round" aria-label="Toggle chat" title="Chat">
          <svg viewBox="0 0 24 24">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          <span id="chat-badge" class="chat-badge" aria-hidden="true" hidden></span>
        </button>
        <button type="button" id="btn-hangup" class="btn-round" aria-label="End call" title="End call">
          <svg viewBox="0 0 24 24">
            <path
              d="M10.68 13.32a16 16 0 0 1-3.88-4.24l2.58-2.58a1 1 0 0 0 .26-.98 11.36 11.36 0 0 1-.5-3.52 1 1 0 0 0-1-1H5.82a1 1 0 0 0-.98.8 13 13 0 0 0 14.36 14.36 1 1 0 0 0 .8-.98v-2.26a1 1 0 0 0-1-1 11.36 11.36 0 0 1-3.52-.5 1 1 0 0 0-.98.26l-2.58 2.58a16 16 0 0 1-4.24-3.88z"
            />
          </svg>
        </button>
      </div>

      <!-- Floating chat panel — visible only during an active call -->
      <div id="chat-panel" class="chat-panel" hidden>
        <div class="chat-header">
          <span class="chat-title">Chat</span>
          <button type="button" id="btn-chat-close" class="chat-close-btn" aria-label="Close chat">
            <svg viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div id="chat-messages" class="chat-messages" aria-live="polite" aria-label="Chat messages"></div>
        <form id="chat-form" class="chat-input-row">
          <input
            type="text"
            id="chat-input"
            class="chat-input-field"
            placeholder="Message…"
            autocomplete="off"
            maxlength="500"
          />
          <button type="submit" class="btn-chat-send" aria-label="Send message">
            <svg viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </form>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
