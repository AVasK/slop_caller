<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>VCall — prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="video-stage">
        <div id="rtc-bar">
          <div id="mode-bar" class="mode-bar">
            <span class="rtc-label">Mode</span>
            <label class="mode-option"
              ><input type="radio" name="sdp-mode" value="ws" checked /> WebSocket</label
            >
            <label class="mode-option"
              ><input type="radio" name="sdp-mode" value="manual" /> Manual SDP</label
            >
          </div>
          <div id="rtc-bar-ws">
            <label class="rtc-label" for="room-input">Room</label>
            <input
              id="room-input"
              type="text"
              autocomplete="off"
              placeholder="same on both devices"
              value="demo"
              maxlength="64"
            />
            <button type="button" id="btn-join" class="btn-join" disabled>Join peer</button>
          </div>
          <div id="manual-sdp-panel" class="manual-sdp-panel" hidden>
            <p class="manual-help">
              No signaling server: ICE is included in each SDP after gathering. Caller creates an
              offer and sends the text (chat, AirDrop, etc.); answerer pastes it and sends the answer
              back; caller pastes the answer and applies it.
            </p>
            <div class="manual-row">
              <button type="button" id="btn-manual-offer" class="btn-manual" disabled>
                1. Create offer
              </button>
              <button type="button" id="btn-manual-copy-out" class="btn-manual secondary" disabled>
                Copy SDP below
              </button>
            </div>
            <label class="sdp-label" for="manual-sdp-out">SDP to copy (offer, then answer)</label>
            <textarea id="manual-sdp-out" class="sdp-textarea" rows="8" readonly></textarea>
            <label class="sdp-label" for="manual-sdp-offer-in">Paste caller’s offer (answerer)</label>
            <textarea
              id="manual-sdp-offer-in"
              class="sdp-textarea"
              rows="5"
              placeholder="v=0&#10;o=…"
            ></textarea>
            <button type="button" id="btn-manual-answer" class="btn-manual" disabled>
              2. Create answer from offer
            </button>
            <label class="sdp-label" for="manual-sdp-answer-in">Paste answer (caller)</label>
            <textarea
              id="manual-sdp-answer-in"
              class="sdp-textarea"
              rows="5"
              placeholder="v=0&#10;o=…"
            ></textarea>
            <button type="button" id="btn-manual-apply-answer" class="btn-manual" disabled>
              3. Apply answer
            </button>
          </div>
          <span id="rtc-status" class="rtc-status"></span>
        </div>

        <div id="mic-meter" aria-hidden="true">
          <span id="mic-meter-label">Mic</span>
          <div id="mic-meter-track">
            <div id="mic-meter-fill"></div>
          </div>
        </div>

        <div id="video-split">
          <div class="video-panel">
            <span class="video-label">You</span>
            <canvas id="feed-canvas" width="640" height="480" aria-label="Camera preview"></canvas>
          </div>
          <div class="video-panel">
            <span class="video-label">Peer</span>
            <video id="remote-video" playsinline autoplay></video>
            <div id="remote-placeholder">No remote yet</div>
          </div>
        </div>
        <div id="feed-placeholder">
          <p id="placeholder-msg">Starting camera…</p>
          <button type="button" id="btn-start-camera" class="btn-start-camera" hidden>
            Start camera
          </button>
        </div>
      </div>

      <div id="status-toast" role="status" aria-live="polite"></div>

      <div id="controls">
        <button
          type="button"
          id="btn-mic"
          class="btn-round"
          aria-label="Toggle microphone"
          aria-pressed="false"
          title="Mute / unmute"
        >
          <svg viewBox="0 0 24 24">
            <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z" />
            <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </button>
        <button type="button" id="btn-hangup" class="btn-round" aria-label="End call" title="End call">
          <svg viewBox="0 0 24 24">
            <path
              d="M10.68 13.32a16 16 0 0 1-3.88-4.24l2.58-2.58a1 1 0 0 0 .26-.98 11.36 11.36 0 0 1-.5-3.52 1 1 0 0 0-1-1H5.82a1 1 0 0 0-.98.8 13 13 0 0 0 14.36 14.36 1 1 0 0 0 .8-.98v-2.26a1 1 0 0 0-1-1 11.36 11.36 0 0 1-3.52-.5 1 1 0 0 0-.98.26l-2.58 2.58a16 16 0 0 1-4.24-3.88z"
            />
          </svg>
        </button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
